name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          echo "frontend=$(git diff HEAD~1 --name-only | grep -q '^frontend/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "backend=$(git diff HEAD~1 --name-only | grep -q '^backend/' && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Build & deploy frontend
        if: steps.changes.outputs.frontend == 'true'
        run: docker compose build frontend && docker compose up -d --no-deps frontend

      - name: Build & deploy backend
        if: steps.changes.outputs.backend == 'true'
        run: docker compose build backend && docker compose up -d --no-deps backend

      - name: Summary
        run: |
          echo "### Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ steps.changes.outputs.frontend }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ steps.changes.outputs.backend }}" >> $GITHUB_STEP_SUMMARY