name: Deploy

on:
  push:
    branches: [main]

env:
  PROJECT_DIR: /home/kjh/Scripture-Typer

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: cd $PROJECT_DIR && git pull origin main

      - name: Detect changes
        id: changes
        run: |
          cd $PROJECT_DIR
          echo "frontend=$(git diff HEAD~1 --name-only | grep -q '^frontend/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "backend=$(git diff HEAD~1 --name-only | grep -q '^backend/' && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Build & deploy frontend
        if: steps.changes.outputs.frontend == 'true'
        run: cd $PROJECT_DIR && docker compose build frontend && docker compose up -d --no-deps frontend

      - name: Build & deploy backend
        if: steps.changes.outputs.backend == 'true'
        run: cd $PROJECT_DIR && docker compose build backend && docker compose up -d --no-deps backend

      - name: Summary
        run: |
          echo "### Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ steps.changes.outputs.frontend }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ steps.changes.outputs.backend }}" >> $GITHUB_STEP_SUMMARY
