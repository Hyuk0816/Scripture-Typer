spring:
  application:
    name: scripture-typer-backend

  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:10432/scripture_typer
    username: scripture
    password: scripture1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  security:
    filter:
      order: 10

jwt:
  secret: c2NyaXB0dXJlLXR5cGVyLWp3dC1zZWNyZXQta2V5LTIwMjYtdmVyeS1sb25nLXNlY3JldC1rZXktZm9yLWhzMjU2
  access-expiration: 3600000   # 1시간
  refresh-expiration: 604800000 # 7일

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  daily-limit: 5

langfuse:
  secret-key: ${LANGFUSE_SECRET_KEY:}
  public-key: ${LANGFUSE_PUBLIC_KEY:}
  base-url: ${LANGFUSE_BASE_URL:https://cloud.langfuse.com}

server:
  port: 8080

logging:
  level:
    com.scriptuotyper: DEBUG
    org.springframework.security: DEBUG
