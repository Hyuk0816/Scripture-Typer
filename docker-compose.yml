services:
  nginx:
    image: nginx:alpine
    container_name: scripture-typer-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - frontend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: scripture-typer-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: scripture-typer-frontend
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: scripture-typer-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/scripture_typer
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-scripture}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-scripture1234}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: scripture-typer-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scripture_typer}
      POSTGRES_USER: ${POSTGRES_USER:-scripture}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scripture1234}
    ports:
      - "10432:5432"  # 개발용 외부 접속. 프로덕션에서는 제거
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scripture -d scripture_typer"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: scripture-typer-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
